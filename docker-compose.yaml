networks:
  dev:

services:
  backend:
    build:
        context: ./src
    container_name: article_service
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app
    networks:
      - dev
  
  postgres:
    image: postgres:latest
    container_name: postgres
    env_file:
    - .env.docker
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - dev

  redis:
    image: redis:latest
    container_name: redis_cache
    ports:
      - "5379:6379"
    networks:
      - dev

volumes:
  postgres_data: